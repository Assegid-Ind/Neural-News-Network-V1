services:
  - type: web
    name: neural-news-network
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CREATOR_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_AGENT_CONCURRENCY
        value: 6
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: 1600
      - key: OPENAI_RETRY_DISABLED_MS
        value: 900000
      - key: NNN_REFRESH_MS
        value: 480000
